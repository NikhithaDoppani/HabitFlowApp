<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - HabitFlow</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i data-lucide="target"></i>
        </div>
        <span class="auth-logo-text">HabitFlow</span>
      </div>

      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <form class="auth-form" onsubmit="AuthForms.handleForgotPassword(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-icon-wrapper">
            <i data-lucide="mail" class="input-icon"></i>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="Enter your email"
              required
              autocomplete="email"
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg">
          <i data-lucide="send"></i>
          Send Reset Link
        </button>
      </form>

      <div class="auth-links" style="justify-content: center; margin-top: var(--space-6);">
        <a href="login.html">
          <i data-lucide="arrow-left" style="width: 16px; height: 16px; vertical-align: middle;"></i>
          Back to Sign In
        </a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
